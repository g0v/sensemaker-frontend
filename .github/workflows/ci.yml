name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  lint_typecheck_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Show Yarn version
        run: yarn -v

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn type-check

      - name: Test
        run: yarn test

